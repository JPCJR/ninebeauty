<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="description" content="Nine Beauty - Especialista em extensão de cabelos em Florianópolis.">
<title>Nine Beauty | Extensão de Cabelos</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Poppins';background:#0a0a0a;color:#fff;}

header{
position:fixed;width:100%;top:0;
background:rgba(0,0,0,0.9);
padding:15px 5%;
display:flex;justify-content:space-between;
z-index:1000;
}

.logo-area{display:flex;align-items:center;gap:10px;}
.logo-area img{width:45px;height:45px;border-radius:50%;}
.logo-area h1{color:#e6c7a1;font-family:'Playfair Display';}

nav{display:flex;gap:20px;}
nav a{color:#fff;text-decoration:none;font-size:0.9rem;}

#hero{height:100vh;position:relative;}
.slide{
position:absolute;width:100%;height:100%;
background-size:cover;background-position:center;
opacity:0;transition:1s;
}
.slide.active{opacity:1;}

.overlay{
position:absolute;width:100%;height:100%;
background:rgba(0,0,0,0.6);
}

.hero-content{
position:absolute;top:50%;left:50%;
transform:translate(-50%,-50%);
text-align:center;width:90%;
}

.hero-content h2{
font-size:2.5rem;
font-family:'Playfair Display';
}

.hero-content p{color:#ccc;margin-top:10px;}

.btn{
background:#e6c7a1;color:#000;
padding:14px 25px;
border-radius:30px;
margin-top:20px;
cursor:pointer;
border:none;
font-weight:600;
transition:0.3s;
}
.btn:hover{transform:scale(1.05);}

section{
padding:90px 5%;
max-width:1100px;
margin:auto;
}

h2{
color:#e6c7a1;
text-align:center;
margin-bottom:20px;
}

.services-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.service-card{
background:#111;
padding:25px;
border-radius:12px;
text-align:center;
transition:0.3s;
}
.service-card:hover{
transform:translateY(-5px);
box-shadow:0 10px 20px rgba(230,199,161,0.2);
}

/* PORTFÓLIO */
.portfolio-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-top:30px;
}

.portfolio-item{
overflow:hidden;
border-radius:12px;
}

.portfolio-item img{
width:100%;
height:300px;
object-fit:cover;
display:block;
transition:0.4s;
}

.portfolio-item:hover img{
transform:scale(1.1);
}

/* FORM */
form{
max-width:500px;
margin:auto;
display:flex;
flex-direction:column;
gap:12px;
}

input,select,textarea{
padding:12px;
border:none;
border-radius:6px;
background:#111;
color:#fff;
}

/* BOTÃO WHATS */
.whatsapp-float{
position:fixed;
bottom:25px;
right:25px;
background:#25D366;
width:60px;height:60px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
z-index:999;
}
.whatsapp-float i{
color:#fff;font-size:28px;
}

footer{
text-align:center;
padding:30px;
background:#000;
color:#888;
}
</style>
</head>

<body>

<header>
<div class="logo-area">
<img src="./images/logobeautynine.jpg">
<h1>Nine Beauty</h1>
</div>

<nav>
<a href="#hero">Home</a>
<a href="#servicos">Serviços</a>
<a href="#portfolio">Resultados</a>
<a href="#agendamento">Agendar</a>
</nav>
</header>

<main>

<section id="hero">
<div class="slide active" style="background-image:url('./images/1.jpeg')"></div>
<div class="slide" style="background-image:url('./images/2.jpeg')"></div>
<div class="slide" style="background-image:url('./images/3.jpeg')"></div>
<div class="overlay"></div>

<div class="hero-content">
<h2>Extensão de Cabelos Premium</h2>
<p>Resultado natural, volume e acabamento profissional.</p>
<p style="color:#e6c7a1;">Agenda limitada essa semana</p>

<button class="btn" onclick="document.getElementById('agendamento').scrollIntoView()">
Agendar agora
</button>
</div>
</section>

<section id="servicos">
<h2>Serviços</h2>

<div class="services-grid">
<div class="service-card"><h3>Extensão de Cabelos</h3></div>
<div class="service-card"><h3>Tranças</h3></div>
<div class="service-card"><h3>Hidratação</h3></div>
<div class="service-card"><h3>Coloração</h3></div>
<div class="service-card"><h3>Infantil</h3></div>
</div>
</section>

<section id="portfolio">
<h2>Resultados</h2>
<div class="portfolio-grid">
<div class="portfolio-item"><img src="./images/1.jpeg"></div>
<div class="portfolio-item"><img src="./images/2.jpeg"></div>
<div class="portfolio-item"><img src="./images/3.jpeg"></div>
</div>
</section>

<section id="agendamento">
<h2>Agendar</h2>

<form onsubmit="enviar(event)">
<input type="text" id="nome" placeholder="Seu nome" required>
<input type="tel" id="telefone" placeholder="Seu WhatsApp" required>

<select id="servico" required>
<option value="">Selecione o serviço</option>
<option>Extensão de Cabelos</option>
<option>Tranças</option>
<option>Hidratação</option>
<option>Coloração</option>
<option>Infantil</option>
</select>

<select id="tipo">
<option value="">Tipo de cabelo</option>
<option>Liso</option>
<option>Ondulado</option>
<option>Cacheado</option>
<option>Crespo</option>
</select>

<select id="tamanho">
<option value="">Tamanho do cabelo</option>
<option>Curto</option>
<option>Médio</option>
<option>Longo</option>
</select>

<input type="date" id="data" required>
<input type="time" id="hora" required>

<textarea id="obs" placeholder="Observações (opcional)"></textarea>

<button class="btn">Agendar pelo WhatsApp</button>
</form>
</section>

</main>

<footer>
<p>© 2026 Nine Beauty</p>
</footer>

<div class="whatsapp-float" onclick="abrirWpp()">
<i class="fab fa-whatsapp"></i>
</div>

<script>
const number = "5548991221330";

function enviar(e){
e.preventDefault();

const nome = document.getElementById("nome").value.trim();
const telefone = document.getElementById("telefone").value.trim();
const servico = document.getElementById("servico").value;
const tipo = document.getElementById("tipo").value;
const tamanho = document.getElementById("tamanho").value;
const data = document.getElementById("data").value;
const hora = document.getElementById("hora").value;
const obs = document.getElementById("obs").value;

if(!nome || !telefone || !servico || !data || !hora){
alert("Preencha os campos obrigatórios!");
return;
}

let msg = `Olá! Meu nome é ${nome}%0A`;
msg += `Telefone: ${telefone}%0A`;
msg += `Serviço: ${servico}%0A`;

if(tipo) msg += `Tipo de cabelo: ${tipo}%0A`;
if(tamanho) msg += `Tamanho: ${tamanho}%0A`;

msg += `Data: ${data}%0AHorário: ${hora}%0A`;

if(obs) msg += `Obs: ${obs}`;

window.open(`https://wa.me/${number}?text=${msg}`, '_blank');
}

function abrirWpp(){
window.open(`https://wa.me/${number}`, '_blank');
}

let slides = document.querySelectorAll('.slide');
let i = 0;

setInterval(()=>{
slides[i].classList.remove('active');
i = (i+1)%slides.length;
slides[i].classList.add('active');
},4000);
</script>

</body>
</html>
